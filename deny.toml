[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained, pulled in via wgpu's metal backend; no replacement upstream — tracked by wgpu" },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "BUSL-1.1",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OFL-1.1",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
